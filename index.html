<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Heart Pockets — 연애 프로그램 보드게임</title>
  <meta name="description" content="연애 프로그램 컨셉의 4인 보드게임 웹 프로토타입">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <canvas id="board-canvas"></canvas>

    <div id="ui-overlay">

      <!-- ===== LOBBY ===== -->
      <div id="screen-lobby" class="screen fullscreen-ui active">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:var(--sp-xl);">
          <div style="animation: float 3s ease-in-out infinite; font-size:4rem; margin-bottom:var(--sp-md);">🎲</div>
          <h1 style="font-family:var(--font-display); font-size:var(--text-4xl); font-weight:800; background:linear-gradient(135deg, var(--pink-400), var(--purple-400)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:var(--sp-sm);">
            Heart Pockets
          </h1>
          <p class="text-muted" style="font-size:var(--text-lg); margin-bottom:var(--sp-2xl);">연애 프로그램 보드게임</p>

          <div class="glass-card" style="padding:var(--sp-xl); width:100%; max-width:480px;">
            <div style="margin-bottom:var(--sp-lg);">
              <label class="text-muted" style="font-size:var(--text-sm); display:block; margin-bottom:var(--sp-sm);">플레이 모드</label>
              <div class="flex gap-sm">
                <button class="btn btn-secondary" id="btn-mode-multi" style="flex:1;">👥 4인 플레이</button>
                <button class="btn btn-secondary selected" id="btn-mode-solo" style="flex:1;">🎮 1인 테스트</button>
              </div>
            </div>
            <div style="margin-bottom:var(--sp-lg);">
              <label class="text-muted" style="font-size:var(--text-sm); display:block; margin-bottom:var(--sp-sm);">공략 대상 성별</label>
              <div class="flex gap-sm">
                <button class="btn btn-secondary selected" id="btn-gender-f" style="flex:1;">👩 여성 NPC</button>
                <button class="btn btn-secondary" id="btn-gender-m" style="flex:1;">👨 남성 NPC</button>
              </div>
            </div>
            <button class="btn btn-primary btn-lg" id="btn-start" style="width:100%; margin-top:var(--sp-md); font-size:var(--text-lg);">
              게임 시작
            </button>
          </div>
          <p class="text-muted mt-lg" style="font-size:var(--text-xs);">프로토타입 v0.4 — 보드게임 시뮬레이터</p>
        </div>
      </div>

      <!-- ===== STAT ALLOCATION ===== -->
      <div id="screen-setup" class="screen fullscreen-ui">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:var(--sp-xl); overflow-y:auto;">
          <h2 style="font-family:var(--font-display); font-size:var(--text-2xl); margin-bottom:var(--sp-sm);">
            <span id="setup-player-name">Player 1</span> — 캐릭터 설정
          </h2>
          <p class="text-muted mb-md" style="font-size:var(--text-sm);">남은 포인트: <span id="setup-remaining" class="text-gold" style="font-weight:700;font-size:var(--text-lg);">4</span></p>
          <div id="setup-card" class="glass-card" style="padding:var(--sp-lg); width:100%; max-width:420px;">
            <div id="setup-portrait" style="text-align:center;margin-bottom:var(--sp-md);"></div>
            <div id="setup-stats" style="margin-bottom:var(--sp-lg);"></div>
            <div style="margin-bottom:var(--sp-md);">
              <div class="text-muted" style="font-size:var(--text-xs);margin-bottom:var(--sp-xs);">세부특성 (랜덤)</div>
              <div id="setup-traits" style="display:flex;gap:var(--sp-xs);flex-wrap:wrap;"></div>
            </div>
            <div>
              <div class="text-muted" style="font-size:var(--text-xs);margin-bottom:var(--sp-xs);">취향카드 (랜덤)</div>
              <div id="setup-pref-cards"></div>
            </div>
          </div>
          <button class="btn btn-primary btn-lg mt-lg" id="btn-setup-confirm" disabled>포인트를 전부 배분하세요</button>
        </div>
      </div>

      <!-- ===== GAME SCREEN ===== -->
      <div id="screen-game" class="screen">
        <!-- Top HUD -->
        <div class="top-hud">
          <div>
            <div id="hud-round" class="text-pink" style="font-family:var(--font-display); font-size:var(--text-lg); font-weight:700;">준비 중</div>
            <div id="hud-phase" class="text-muted" style="font-size:var(--text-xs);">게임 로딩...</div>
          </div>
          <div class="flex items-center gap-md">
            <div id="hud-tokens" class="token-display">🪙 토큰: <span id="hud-token-count">13</span></div>
            <div id="hud-player" class="flex items-center gap-sm" style="font-size:var(--text-sm);">
              <span id="hud-player-emoji">🌹</span>
              <span id="hud-player-name">Player 1</span>
            </div>
          </div>
        </div>

        <!-- Bottom Panel (동적으로 채워짐) -->
        <div class="bottom-panel" id="game-panel">
          <div id="panel-content"></div>
        </div>
      </div>

      <!-- ===== FINAL SCREEN ===== -->
      <div id="screen-final" class="screen fullscreen-ui">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:var(--sp-xl); overflow-y:auto;">
          <div style="font-size:4rem; animation: heartBeat 1.5s ease-in-out infinite;">🎲</div>
          <h2 style="font-family:var(--font-display); font-size:var(--text-3xl); margin:var(--sp-md) 0;" class="text-pink">최종 결과</h2>
          <div id="final-results" style="width:100%; max-width:600px;"></div>
          <button class="btn btn-primary btn-lg mt-lg" id="btn-restart">🔄 다시 하기</button>
        </div>
      </div>

      <!-- ===== MODAL ===== -->
      <div id="modal-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.25); z-index:100; align-items:center; justify-content:center; pointer-events:auto;">
        <div id="modal-content" class="glass-card" style="padding:var(--sp-lg); max-width:420px; width:85%; max-height:60vh; overflow-y:auto; backdrop-filter:blur(12px);"></div>
      </div>

    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
